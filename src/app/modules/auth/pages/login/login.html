<div class="login-container">

  <div class="login-card">

    <div class="text-center mb-4">

      <img src="assets/images/logo.png" alt="School Logo" class="logo" width="40" height="40">

      <h2>School ERP</h2>

      <p class="text-muted">
        Sign in to continue
      </p>

    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <div class="mb-3">

        <label class="form-label">
          Tenant Code
        </label>

        <input type="text" class="form-control" formControlName="tenantCode">

      </div>

      <div class="mb-3">

        <label class="form-label">
          Username
        </label>

        <input type="text" class="form-control" formControlName="userName">

      </div>

      <div class="mb-4">

        <label class="form-label">
          Password
        </label>

        <input type="password" class="form-control" formControlName="password">

      </div>

      <button type="submit" class="btn btn-primary w-100">

        Login

      </button>

    </form>

  </div>

</div>
